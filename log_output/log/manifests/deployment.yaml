apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: log-storage
          persistentVolumeClaim:
            claimName: log-claim
        - name: config
          configMap:
            name: configmap
      containers:
        - name: log-write
          image: lindkon/log-write
          env:
          volumeMounts:
            - name: log-storage
              mountPath: /usr/src/app/files
        - name: log-read
          image: lindkon/log-read
          env:
            - name: PORT
              value: "3000"
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: configmap
                  key: message
          volumeMounts:
            - name: log-storage
              mountPath: /usr/src/app/files
            - name: config
              mountPath: /etc/config
              readOnly: true
          readinessProbe:
            initialDelaySeconds: 10 # Initial delay until the readiness is tested
            periodSeconds: 5 # How often to test
            httpGet:
               path: /healthz
               port: 3000
      

