apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: log-storage
          persistentVolumeClaim:
            claimName: log-claim
      containers:
        - name: log-write
          image: lindkon/log-write:1.11
          env:
          volumeMounts:
          - name: log-storage
            mountPath: /usr/src/app/files
        - name: log-read
          image: lindkon/log-read:1.11
          env:
          - name: PORT
            value: "3000"
          volumeMounts:
          - name: log-storage
            mountPath: /usr/src/app/files
