name: Release application

on:
  push:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-b
  REGISTRY: europe-north1-docker.pkg.dev
  REPOSITORY: my-repository
  BRANCH: ${{ github.ref_name }}

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest
    environment: GKE_PROJECT

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - name: 'Configure Docker'
        run: gcloud --quiet auth configure-docker $REGISTRY

      - name: 'Get GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v3'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          project_id: '${{ env.PROJECT_ID }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Form image tags'
        run: |-
          echo "TODO_MAIN_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-main:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "GET_IMAGE_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/get-image:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "TODO_BACKEND_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-backend:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build and publish images
        run: |-
          docker build --tag $TODO_MAIN_TAG the_project/todo-app/todo-main
          docker build --tag $GET_IMAGE_TAG the_project/todo-app/get-image
          docker build --tag $TODO_BACKEND_TAG the_project/todo-backend
          docker push $TODO_MAIN_TAG
          docker push $GET_IMAGE_TAG
          docker push $TODO_BACKEND_TAG

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: 'Set namespace'
        run: |-
          if [ "$BRANCH" = "main" ]; then
            echo "NAMESPACE=project" >> $GITHUB_ENV
          else
            echo "NAMESPACE=$BRANCH" >> $GITHUB_ENV
          fi

      - name: Deploy
        working-directory: the_project
        run: |-
          kubectl create namespace $NAMESPACE || true
          kubectl config set-context --current --namespace=$NAMESPACE
          kustomize edit set namespace $NAMESPACE
          kustomize edit set image lindkon/todo-main=$TODO_MAIN_TAG
          kustomize edit set image lindkon/get-image=$GET_IMAGE_TAG
          kustomize edit set image lindkon/todo-backend=$TODO_BACKEND_TAG
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment todo-app -n $NAMESPACE
          kubectl rollout status deployment todo-backend -n $NAMESPACE
          kubectl get services -o wide -n $NAMESPACE