name: Build and publish application

concurrency:
  group: build-publish
  cancel-in-progress: false

on:
  push:
    branches: [main]

jobs:
  build-publish:
    name: Build, Push, Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag image with the GitHub SHA to get a unique tag
      - name: Build and publish backend
        run: |-
          docker build --tag "lindkon/broadcaster:$GITHUB_SHA" the_project/broadcaster
          docker build --tag "lindkon/todo-backend:$GITHUB_SHA" the_project/todo-backend
          docker build --tag "lindkon/todo-main:$GITHUB_SHA" the_project/todo-app/todo-main
          docker build --tag "lindkon/get-image:$GITHUB_SHA" the_project/todo-app/get-image
          docker push "lindkon/broadcaster:$GITHUB_SHA"
          docker push "lindkon/todo-backend:$GITHUB_SHA"
          docker push "lindkon/todo-main:$GITHUB_SHA"
          docker push "lindkon/get-image:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Use right image
        working-directory: the_project
        run: |-
          kustomize edit set image lindkon/broadcaster=lindkon/broadcaster:$GITHUB_SHA
          kustomize edit set image lindkon/todo-backend=lindkon/todo-backend:$GITHUB_SHA
          kustomize edit set image lindkon/todo-main=lindkon/todo-main:$GITHUB_SHA
          kustomize edit set image lindkon/get-image=lindkon/get-image:$GITHUB_SHA

      - name: Rebase on latest main
        run: |-
          git pull --rebase origin main
     
      - name: commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v10
        with:
          add: 'the_project/kustomization.yaml'
          message: 'New version released ${{ github.sha }} [skip ci]'