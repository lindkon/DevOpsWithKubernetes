name: Build and publish application

on:
  push:
    branches: [main]

jobs:
  build-publish:
    name: Build, Push, Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag image with the GitHub SHA to get a unique tag
      - name: Build and publish backend
        run: |-
          docker build --tag "lindkon/log-write:$GITHUB_SHA" log/log-write
          docker build --tag "lindkon/log-read:$GITHUB_SHA" log/log-read
          docker build --tag "lindkon/ping-pong:$GITHUB_SHA" ping-pong/
          docker push "lindkon/log-write:$GITHUB_SHA"
          docker push "lindkon/log-read:$GITHUB_SHA"
          docker push "lindkon/ping-pong:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Use right image
        run: |-
          kustomize edit set image lindkon/log-write=lindkon/log-write:$GITHUB_SHA
          kustomize edit set image lindkon/log-read=lindkon/log-read:$GITHUB_SHA
          kustomize edit set image lindkon/ping-pong=lindkon/ping-pong:$GITHUB_SHA

      - name: commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v10
        with:
          add: 'kustomization.yaml'
          message: New version released ${{ github.sha }}