apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project-staging

resources:
  - ../../base
  - route.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: broadcaster
      spec:
        template:
          spec:
            containers:
              - name: broadcaster
                env:
                  - name: LOG_ONLY
                    value: "true"