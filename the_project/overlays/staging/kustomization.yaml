apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project-staging

resources:
- ../../base
- route.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: broadcaster
      spec:
        template:
          spec:
            containers:
              - name: broadcaster
                env:
                  - name: LOG_ONLY
                    value: "true"
                  - name: NATS_SUBJECT
                    value: todos.events.staging
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: todo-backend
      spec:
        template:
          spec:
            containers:
              - name: todo-backend
                env:
                  - name: NATS_SUBJECT
                    value: todos.events.staging
images:
- name: lindkon/broadcaster
  newName: lindkon/broadcaster
  newTag: 2c1a20ed59774f79ce0e7e4671d3949030bbb032
- name: lindkon/get-image
  newName: lindkon/get-image
  newTag: 2c1a20ed59774f79ce0e7e4671d3949030bbb032
- name: lindkon/todo-backend
  newName: lindkon/todo-backend
  newTag: 2c1a20ed59774f79ce0e7e4671d3949030bbb032
- name: lindkon/todo-main
  newName: lindkon/todo-main
  newTag: 2c1a20ed59774f79ce0e7e4671d3949030bbb032
