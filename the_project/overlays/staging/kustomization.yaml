apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project-staging

resources:
- ../../base
- route.yaml

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: broadcaster
    spec:
      template:
        spec:
          containers:
            - name: broadcaster
              env:
                - name: LOG_ONLY
                  value: "true"
images:
- name: lindkon/broadcaster
  newName: lindkon/broadcaster
  newTag: cce6ce425d01b6a1e6cd8ec7c17b2a0f17d9318b
- name: lindkon/get-image
  newName: lindkon/get-image
  newTag: cce6ce425d01b6a1e6cd8ec7c17b2a0f17d9318b
- name: lindkon/todo-backend
  newName: lindkon/todo-backend
  newTag: cce6ce425d01b6a1e6cd8ec7c17b2a0f17d9318b
- name: lindkon/todo-main
  newName: lindkon/todo-main
  newTag: cce6ce425d01b6a1e6cd8ec7c17b2a0f17d9318b
