apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-ingress
  namespace: project
spec:
  rules:
  - host: project.localhost
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: todo-app-svc
              port:
                number: 80
        - path: /todos
          pathType: Prefix
          backend:
            service:
              name: todo-backend-svc
              port:
                number: 80